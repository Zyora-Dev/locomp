name: Test locomp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-m4:
    name: Tests on macOS (Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System info
        run: |
          echo "=== Hardware ==="
          sysctl -n machdep.cpu.brand_string
          sysctl -n hw.memsize | awk '{print $0/1073741824 " GB RAM"}'
          system_profiler SPDisplaysDataType 2>/dev/null | grep -A5 "Chipset\|Chip" || true
          echo "=== Python ==="
          python --version
          echo "=== Metal ==="
          python -c "
          try:
              import objc
              from Metal import MTLCreateSystemDefaultDevice
              d = MTLCreateSystemDefaultDevice()
              print(f'GPU: {d.name()}')
              print(f'Registry ID: {d.registryID()}')
              print(f'Max buffer: {d.maxBufferLength() / 1e9:.1f} GB')
          except:
              print('Metal not available in CI')
          "

      - name: Install locomp
        run: |
          pip install -e ".[dev]"

      - name: Compile C bridge
        run: |
          cd locomp/_native
          clang -O2 -shared -o fast_dispatch.dylib fast_dispatch.m \
            -framework Metal -framework Foundation
          echo "C bridge compiled: $(file fast_dispatch.dylib)"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run example kernels
        run: |
          echo "=== Vector Add ==="
          python examples/01_vector_add.py
          echo ""
          echo "=== Matmul ==="
          python examples/04_matmul.py
          echo ""
          echo "=== Softmax ==="
          python examples/05_softmax.py
          echo ""
          echo "=== Float16 ==="
          python examples/06_float16_vector_add.py
          echo ""
          echo "=== Math Ops ==="
          python examples/23_math_ops.py

      - name: Run SmolLM2 inference
        run: |
          pip install safetensors torch huggingface_hub
          python examples/54_smollm2_inference.py
