name: CUDA Codegen Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cuda-codegen:
    name: CUDA Codegen (no GPU required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locomp
        run: pip install -e ".[dev]"

      - name: Run CUDA codegen tests (no GPU needed — tests codegen output only)
        run: |
          pytest tests/test_cuda_codegen.py -v --tb=short

  cuda-execution:
    name: CUDA Execution (A10G via Modal)
    runs-on: ubuntu-latest
    # Only run on manual trigger or when explicitly requested
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install locomp + modal
        run: |
          pip install -e ".[dev]"
          pip install modal

      - name: Run Modal CUDA execution tests
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal run tests/modal_cuda_runner.py
